<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="CSS/viewing cart.css">
</head>
<body>

  <div class="cart-header">
    <img src="https://img.icons8.com/ios-filled/50/1e90ff/shopping-bag.png" alt="logo" class="logo">
    <h2>PowerPuffGirls | SHOPPING CART</h2>
    <button class="close-btn">&times;</button>
  </div>

  <div class="cart-container">
    <!-- Cart items will be populated by JS -->
  </div>

  <!-- Footer -->
  <div class="cart-footer">
    <span>Total (<span id="item-count">4</span> items): <b>$<span id="total-price">857.49</span></b></span>
    <button class="checkout-btn">Check Out</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
