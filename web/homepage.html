<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerPuffGirls Shopping</title>
  <link rel="stylesheet" href="CSS/homepage.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">
      <img src="https://img.icons8.com/ios-filled/50/1e90ff/shopping-bag.png" alt="logo">
      <span>PowerPuffGirls Shopping</span>
    </div>
    <div class="search-bar">
      <input type="text" placeholder="Find Products">
      <button><img src="https://img.icons8.com/ios-filled/24/search--v1.png" alt="search"></button>
    </div>
    <div class="nav-links">
      <a href="index.html">Logout</a>
      <div class="cart">
        <a href="Viewing cart.html"><img src="https://img.icons8.com/ios-filled/30/shopping-cart.png" alt="cart"></a>
      </div>
    </div>
  </header>

  <!-- Categories -->
  <nav class="categories">
    <button class="active">All Categories</button>
    <button>Accessories</button>
    <button>Home & Lifestyle</button>
    <button>Tech & Gadgets</button>
    <button>Fashion & Accessories</button>
    <button>Beauty & Personal Care</button>
    <button>Electronics</button>
  </nav>

  <!-- Products Grid -->
  <section class="products" id="products-container">
    <!-- Products will be dynamically loaded here -->
  </section>

  <!-- Product Card Template -->
  <template id="product-card-template">
    <article class="product-card" data-product-id="">
      <div class="product-image">
        <img src="Photos/placeholder.jpg" alt="" loading="lazy">
      </div>
      <div class="product-info">
        <h3 class="product-title"></h3>
        <div class="product-meta">
          <span class="price"></span>
          <div class="rating" aria-label="Rating: out of 5">
            <span class="sr-only"> out of 5 stars</span>
          </div>
        </div>
        <button class="btn add-to-cart" aria-label="Add to cart">
          Add to Cart
        </button>
      </div>
    </article>
  </template>

  <!-- Product Modal -->
  <div id="product-modal" class="modal">
    <div class="product-modal">
      <button class="close-btn">&times;</button>
      <div class="modal-content">
        <div class="product-id" id="modal-product-id">ID: </div>
        <div class="product-image">
          <img id="modal-image" src="" alt="Product Image">
        </div>
        <div class="product-info">
          <h2 id="modal-title"></h2>
          <div class="rating" id="modal-rating">★★★★★</div>
          <div class="price" id="modal-price">$4.49</div>

          <div class="quantity">
            <label>Quantity</label>
            <div class="qty-control">
              <button id="qty-minus">-</button>
              <span id="qty-value">1</span>
              <button id="qty-plus">+</button>
            </div>
          </div>

          <div class="actions">
            <button class="add-cart" id="modal-add-to-cart">Add To Cart</button>
            <button class="buy-now" id="modal-buy-now">Buy Now</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api-service.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
