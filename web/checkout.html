<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="CSS/checkout.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="cart-header">
    <div class="logo">
      <i class="fa-solid fa-bag-shopping"></i>
      <span>PowerPuffGirls | <strong>SHOPPING CART</strong></span>
    </div>
   
    <button class="close-btn"><i class="fa-solid fa-xmark"></i></button>
  </header>

  <!-- Cart Items -->
  <main class="cart-container">
    <div class="cart-items">
      <!-- Cart items will be populated by JS -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="cart-footer">
    <p>Total (<span id="item-count">0</span> items): <strong>$<span id="total-price">0.00</span></strong></p>
    <button class="checkout-btn" onclick="alert('Checkout successful!')">Check Out</button>
  </footer>

  <script src="js/api-service.js"></script>
  <script src="main.js"></script>
</body>
</html>
