<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - PowerPuffGirls</title>
  <link rel="stylesheet" href="CSS/viewing cart.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="cart-header">
    <div class="header-left">
      <img src="https://img.icons8.com/ios-filled/50/1e90ff/shopping-bag.png" alt="logo" class="logo">
      <h2>Your Shopping Cart</h2>
    </div>
    <button class="close-btn" id="close-cart">&times;</button>
  </div>

  <div class="cart-container" id="cart-items">
    <!-- Cart items will be populated by JavaScript -->
    <div class="empty-cart" id="empty-cart">
      <i class="fas fa-shopping-cart"></i>
      <h3>Your cart is empty</h3>
      <p>Looks like you haven't added anything to your cart yet</p>
      <a href="index.html" class="continue-shopping">Continue Shopping</a>
    </div>
  </div>

  <div class="cart-footer" id="cart-footer" style="display: none;">
    <div class="cart-summary">
      <div class="total-amount">
        <span class="label">Subtotal (<span id="item-count">0</span> items):</span>
        <span class="price" id="total-price">$0.00</span>
      </div>
      <div class="shipping-info">
        <i class="fas fa-truck"></i> Free shipping on orders over $50
      </div>
    </div>
    <button class="checkout-btn" id="checkout-btn">
      <i class="fas fa-shopping-cart"></i> Buy Now
    </button>
  </div>

  <script src="main.js"></script>
</body>
</html>
